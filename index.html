<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movies Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent2: #e8c98e;
      --text: #f0ece4;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(200,169,110,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(200,169,110,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo p {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 11px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #0d0d0d;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    /* Forms */
    .form { display: none; animation: fadeIn 0.35s ease; }
    .form.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .form .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.25s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: #444; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
    }

    .submit-btn:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .footer-link span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    .footer-link span:hover { text-decoration: underline; }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      display: none;
    }
    .message.error { background: rgba(220,80,80,0.1); border: 1px solid rgba(220,80,80,0.3); color: #e88; }
    .message.success { background: rgba(80,200,120,0.1); border: 1px solid rgba(80,200,120,0.3); color: #8e8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Your Entertainment Just One Step Ahead</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="card">

      <!-- LOGIN FORM -->
      <form class="form active" id="loginForm" action="LoginServlet" method="POST">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue your session</p>

        <div id="loginMsg" class="message"></div>

        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
        </div>

        <div class="divider"></div>
        <button type="submit" class="submit-btn">Sign In</button>

        <div class="footer-link">
          No account? <span onclick="switchTab('signup')">Create one</span>
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form class="form" id="signupForm" action="SignupServlet" method="POST">
        <h2>Create account</h2>
        <p class="subtitle">Join us — it only takes a moment</p>

        <div id="signupMsg" class="message"></div>

        <div class="field">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" name="fullname" placeholder="Jane Doe" required />
        </div>

        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" name="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="password" placeholder="Min. 8 characters" minlength="8" required />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required />
        </div>

        <div class="divider"></div>
        <button type="submit" class="submit-btn" onclick="return validateSignup()">Create Account</button>

        <div class="footer-link">
          Already a member? <span onclick="switchTab('login')">Log in</span>
        </div>
      </form>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
      });
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    function validateSignup() {
      const pass = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('signupMsg');
      if (pass !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'message error';
        msg.style.display = 'block';
        return false;
      }
      msg.style.display = 'none';
      return true;
    }

    // Show server messages passed via URL params (after redirect from servlet)
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      const tab = params.get('tab') || 'login';
      switchTab(tab);
      const msgEl = document.getElementById(tab + 'Msg');
      msgEl.textContent = decodeURIComponent(params.get('error'));
      msgEl.className = 'message error';
      msgEl.style.display = 'block';
    }
    if (params.get('success')) {
      switchTab('login');
      const msgEl = document.getElementById('loginMsg');
      msgEl.textContent = decodeURIComponent(params.get('success'));
      msgEl.className = 'message success';
      msgEl.style.display = 'block';
    }
  </script>
</body>
</html>
